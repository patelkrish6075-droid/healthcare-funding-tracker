name: Run Healthcare Funding Script

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas feedparser python-dateutil

      - name: Run script
        run: |
          python health_funding.py

      - name: Commit database
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add funding.db
          git commit -m "Auto update funding data" || echo "No changes"
          git push
